version: '3.8'

services:
  flipova-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flipova-studio
    ports:
      - "4200:4200"
    volumes:
      # Persist the studio project data
      - studio-data:/app/.flipova-studio
      # Mount generated code to host
      - generated-code:/app/generated
    environment:
      - NODE_ENV=production
      - PORT=4200
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4200/api/registry', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  studio-data:
    driver: local
  generated-code:
    driver: local
