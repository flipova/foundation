<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue background -->
  <rect width="200" height="200" fill="#000091"/>
  
  <!-- Foundation symbol: Triangle + bar on base -->
  <g fill="white">
    <!-- Triangle pointing up -->
    <polygon points="100,40 60,120 140,120"/>
    
    <!-- Horizontal bar at base -->
    <rect x="50" y="130" width="100" height="12" rx="2"/>
  </g>
</svg>